<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Extraction strategy decision tree">
  <defs>
    <style>
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:14;}
      .title{font:700 14px ui-sans-serif,system-ui;fill:#0f172a;}
      .text{font:12px ui-sans-serif,system-ui;fill:#334155;}
      .small{font:11px ui-sans-serif,system-ui;fill:#475569;}
      .arrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#m);} 
      .accent{stroke:#1f6feb;}
      .dashed{stroke-dasharray:6 6;}
      .gate{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:14;}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="20" y="24" width="940" height="470" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
  <text x="40" y="52" class="title">Decision Tree: DocumentProfile → Strategy Selection → Confidence-Gated Escalation</text>

  <rect x="60" y="90" width="300" height="90" class="box"/>
  <text x="78" y="118" class="title">Input: DocumentProfile</text>
  <text x="78" y="140" class="text">origin_type · layout_complexity · domain_hint · cost_tier</text>
  <text x="78" y="160" class="small">Signals: avg_char_density · avg_image_density · font_coverage · table_density</text>

  <rect x="420" y="90" width="230" height="70" class="gate"/>
  <text x="438" y="118" class="title">Select initial tier</text>
  <text x="438" y="140" class="small">(rules.yaml selection maps)</text>

  <rect x="720" y="60" width="200" height="70" class="box"/>
  <text x="738" y="88" class="title">Strategy A</text>
  <text x="738" y="108" class="small">Fast Text</text>

  <rect x="720" y="150" width="200" height="70" class="box"/>
  <text x="738" y="178" class="title">Strategy B</text>
  <text x="738" y="198" class="small">Layout-Aware</text>

  <rect x="720" y="240" width="200" height="70" class="box"/>
  <text x="738" y="268" class="title">Strategy C</text>
  <text x="738" y="288" class="small">Vision (budget cap)</text>

  <rect x="420" y="205" width="230" height="85" class="gate"/>
  <text x="438" y="233" class="title">Confidence gate</text>
  <text x="438" y="255" class="small">if conf &lt; min_threshold → escalate</text>
  <text x="438" y="275" class="small">A→B, then B→C</text>

  <rect x="60" y="335" width="860" height="130" class="gate"/>
  <text x="78" y="365" class="title">Graceful degradation</text>
  <text x="78" y="388" class="text">If final strategy confidence &lt; global threshold → flag for review</text>
  <text x="78" y="410" class="small">metadata.review_required=true · routing_trace=[...] · degraded flags on vision fallback</text>

  <!-- arrows -->
  <path d="M360 135 L420 125" class="arrow"/>
  <path d="M650 125 L720 95" class="arrow"/>
  <path d="M650 125 L720 185" class="arrow"/>
  <path d="M650 125 L720 275" class="arrow"/>

  <path d="M820 130 L650 225" class="arrow"/>
  <path d="M820 220 L650 245" class="arrow"/>
  <path d="M820 310 L650 265" class="arrow"/>

  <!-- escalation -->
  <path d="M820 130 L820 150" class="arrow dashed accent"/>
  <path d="M820 220 L820 240" class="arrow dashed accent"/>

  <path d="M535 290 L535 335" class="arrow"/>

  <text x="720" y="330" class="small" fill="#1f6feb">Dashed arrows = escalation</text>
</svg>
